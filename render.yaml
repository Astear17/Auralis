services:
  - type: web
    name: auralis
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.15.0
      - key: NEXT_PUBLIC_APP_NAME
        value: Auralis
      - key: DATABASE_URL
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
