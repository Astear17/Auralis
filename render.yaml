services:
  - type: web
    name: auralis
    runtime: node
    plan: free
    numInstances: 1
    autoDeploy: false
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.15.0
      - key: NEXT_PUBLIC_APP_NAME
        value: Auralis
